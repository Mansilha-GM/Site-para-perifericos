<!DOCTYPE html>
<!-- Estrutura principal do documento HTML -->
<html lang="pt-BR">

<head>
  <!-- Configurações da página (meta tags, título e estilos) -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periféricos</title>

  <style>
    /* Estilização geral do site (cores, layout, botões, cards, etc.) */
    * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body {background:linear-gradient(180deg,#050505,#0a0f2c);color:#fff;}

    header {display:flex;justify-content:space-between;padding:20px 40px;position:fixed;width:100%;background:rgba(5,5,10,0.6);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,255,150,0.2);z-index:1000;}
    header h1 {color:#00ff99;font-size:20px;}
    nav a {margin-left:20px;text-decoration:none;color:#aaa;transition:0.3s;}
    nav a:hover {color:#00ff99;}

    .hero {height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center;}
    .hero h2 {font-size:50px;margin-bottom:10px;}
    .hero p {color:#aaa;margin-bottom:20px;}
    .btn {padding:12px 25px;border:none;background:#00ff99;color:#000;cursor:pointer;border-radius:5px;}

    .categories {padding:100px 40px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
    .cat-btn {padding:20px 35px;border:1px solid rgba(0,255,150,0.3);background:#0d1335;color:#fff;cursor:pointer;border-radius:8px;transition:0.3s;font-size:18px;}
    .cat-btn:hover {background:#00ff99;color:#000;}

    .products {padding:40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}

    .card {background:linear-gradient(145deg,#111,#0d1335);padding:15px;border-radius:12px;border:1px solid rgba(0,255,150,0.1);transition:0.3s;}
    .card:hover {transform:translateY(-8px);border:1px solid rgba(0,255,150,0.4);}

    .card img {width:100%;border-radius:10px;margin-bottom:10px;}
    .card h3 {
      margin-bottom: 5px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .price {color:#00ff99;margin-top:5px;font-weight:bold;}

    footer {text-align:center;padding:20px;color:#777;}
  </style>
</head>

<body>

<!-- Cabeçalho com navegação -->
<header>
  <h1>Periféricos</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#produtos">Produtos</a>
  </nav>
</header>

<!-- Seção inicial (hero) -->
<section class="hero">
  <h2>Monte seu setup aqui mesmo</h2>
  <p>Escolha por categoria</p>
  <button class="btn" onclick="scrollToProducts()">Explorar</button>
</section>

<!-- Botões de categorias -->
<section class="categories">
  <button class="cat-btn" onclick="showCategory('mouse')">Mouse</button>
  <button class="cat-btn" onclick="showCategory('teclado')">Teclado</button>
  <button class="cat-btn" onclick="showCategory('fone')">Headset</button>
</section>

<!-- Área onde os produtos aparecem -->
<section class="products" id="produtos"></section>

<!-- Rodapé -->
<footer>
  <p>© 2026 Periféricos</p>
</footer>

<script>

}

// Função que renderiza os produtos na tela
function showCategory(cat){
  const container = document.getElementById('produtos');
  container.innerHTML = '';

  data[cat].forEach(item => {
    container.innerHTML += `
      <div class="card" onclick="window.open('${item.link}', '_blank')">
        <img src="${item.img}">
        <h3>${item.nome}</h3>
        <p class="price">${item.preco}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
